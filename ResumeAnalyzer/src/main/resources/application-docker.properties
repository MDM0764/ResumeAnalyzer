# Docker profile-specific configuration
spring.application.name=ResumeAnalyzer

server.port=8080

# File upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Ollama configuration (connect to host Ollama or separate container)
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${OLLAMA_MODEL:steamdj/llama3.1-cpu-only}
spring.ai.ollama.chat.options.num-ctx=65535
spring.ai.retry.max-attempts=1

# Gemini API
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=${GEMINI_MODEL:gemini-3.5-flash}

# Deepseek API
spring.ai.deepseek.api-key=${DEEPSEEK_API_KEY:}
spring.ai.deepseek.chat.model=${DEEPSEEK_MODEL:deepseek-v4-pro}
version: '3.8'

services:
  # Ollama service for local LLM
  ollama:
    image: ollama/ollama:latest
    container_name: resume-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - resume-network

  # Spring Boot Backend
  backend:
    build:
      context: ./ResumeAnalyzer
      dockerfile: Dockerfile
    container_name: resume-backend
    ports:
      - "8080:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=steamdj/llama3.1-cpu-only
    depends_on:
      - ollama
    networks:
      - resume-network

  # Frontend (Vite/React)
  frontend:
    build:
      context: ./ResumeAnalyzerFrontEnd
      dockerfile: Dockerfile
    container_name: resume-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    networks:
      - resume-network

volumes:
  ollama_data:

networks:
  resume-network: